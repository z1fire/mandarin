---
layout: default
---

<article class="story">
  <h1>{{ page.title }}</h1>

  <div class="meta">
    {{ page.date | date: "%Y-%m-%d" }}
    {% if page.level %} · {{ page.level }}{% endif %}
    {% if page.tags %} · {{ page.tags | join: ", " }}{% endif %}
  </div>

  <div class="story-content" id="story">
    {{ content }}
  </div>
</article>

<!-- MandarinSpot annotation API -->
<script src="//mandarinspot.com/static/mandarinspot.min.js" charset="UTF-8"></script>
<script>
  // Annotate only the story text
  mandarinspot.annotate('#story', { phonetic: 'pinyin', inline: false, show: true });
</script>
